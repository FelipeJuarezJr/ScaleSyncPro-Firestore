<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A Progressive Web App for managing reptile collections, breeding projects, schedules, and inventory.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="theme-color" content="#00FF00">
  <meta name="mobile-web-app-capable" content="yes">
  
  <!-- Google Sign-In OAuth Client ID (Firebase project: scalesync-pro, project#: 123833527982) -->
  <!-- Used by Firebase signInWithPopup on web. Source: Firebase Console > Auth > Sign-in method > Google -->
  <meta name="google-signin-client_id" content="123833527982-e7ha4fbrpj65kh5qml854bqh272hivvu.apps.googleusercontent.com">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ScaleSyncPro">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ScaleSyncPro</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // The value below is injected by flutter build, do not touch.
    const serviceWorkerVersion = {{flutter_service_worker_version}};
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>

  <style>
    body {
      background-color: #1A1A1A;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #1A1A1A;
      z-index: 99999;
      opacity: 1;
      transition: opacity 0.4s ease-in-out;
    }
    .logo-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .logo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      animation: pulse 3s infinite ease-in-out;
    }
    .loader-bar-container {
      position: absolute;
      bottom: 15%;
      width: 200px;
      height: 4px;
      background-color: rgba(44, 44, 44, 0.8);
      border-radius: 2px;
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.4);
      z-index: 2;
    }
    .loader-bar {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #00FF00, #00D4FF);
      transform: translateX(-100%);
      animation: loading 1.6s infinite cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes pulse {
      0%, 100% {
        transform: scale(1.0);
      }
      50% {
        transform: scale(1.02);
      }
    }
    @keyframes loading {
      0% {
        transform: translateX(-100%);
      }
      50% {
        transform: translateX(0%);
      }
      100% {
        transform: translateX(100%);
      }
    }
    #splash-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="splash-screen">
    <div class="logo-container">
      <picture>
        <source srcset="scaleSyncProLogo_mobile.png" media="(max-width: 767px)">
        <img class="logo" src="scaleSyncProLogo_desktop.png" alt="ScaleSync Pro Logo" />
      </picture>
      <div class="loader-bar-container">
        <div class="loader-bar"></div>
      </div>
    </div>
  </div>

  <script>
    window.addEventListener('load', function(ev) {
      // Download main.dart.js
      _flutter.loader.load({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp().then(function() {
              // Smoothly transition and hide splash screen once Flutter has run
              const splash = document.getElementById('splash-screen');
              if (splash) {
                splash.classList.add('hidden');
                setTimeout(function() {
                  splash.remove();
                }, 400); // Matches CSS transition duration
              }
            });
          });
        }
      });
    });
  </script>
</body>
</html>
