<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A Progressive Web App for managing reptile collections, breeding projects, schedules, and inventory.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="theme-color" content="#00FF00">
  <meta name="mobile-web-app-capable" content="yes">
  
  <!-- Google Sign-In OAuth Client ID (Firebase project: scalesync-pro, project#: 123833527982) -->
  <!-- Used by Firebase signInWithPopup on web. Source: Firebase Console > Auth > Sign-in method > Google -->
  <meta name="google-signin-client_id" content="123833527982-e7ha4fbrpj65kh5qml854bqh272hivvu.apps.googleusercontent.com">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ScaleSyncPro">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ScaleSyncPro</title>
  <script>
    (function() {
      var port = window.location.port;
      var host = window.location.hostname.toLowerCase();
      var manifestFile = 'manifest_pro.json';
      var title = 'ScaleSync Pro';
      var targetClass = 'target-pro';

      if (host.includes('marketplace') || port === '8082') {
        manifestFile = 'manifest_market.json';
        title = 'ScaleSync Marketplace';
        targetClass = 'target-market';
      } else if (host.includes('social') || port === '8083') {
        manifestFile = 'manifest_social.json';
        title = 'ScaleSync Social';
        targetClass = 'target-social';
      }

      document.title = title;

      var link = document.createElement('link');
      link.rel = 'manifest';
      link.href = manifestFile;
      document.head.appendChild(link);
    })();
  </script>


  <style>
    body {
      background-color: #1A1A1A;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #1A1A1A;
      z-index: 99999;
      opacity: 1;
      transition: opacity 0.4s ease-in-out;
    }
    .logo-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 24px;
      animation: pulse 2.5s infinite ease-in-out;
    }
    .title {
      font-size: 24px;
      font-weight: 600;
      color: #FFFFFF;
      letter-spacing: 0.5px;
      margin-bottom: 32px;
      opacity: 0.9;
    }
    .loader-bar-container {
      width: 200px;
      height: 4px;
      background-color: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
      z-index: 2;
    }
    .loader-bar {
      width: 100%;
      height: 100%;
      transform: translateX(-100%);
      animation: loading 1.6s infinite cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Pro specific styles */
    .target-pro .logo {
      filter: drop-shadow(0 0 20px rgba(0, 255, 0, 0.25));
    }
    .target-pro .loader-bar {
      background: linear-gradient(90deg, #00FF00, #00D4FF);
    }

    /* Market specific styles */
    .target-market .logo {
      filter: drop-shadow(0 0 20px rgba(0, 212, 255, 0.25));
    }
    .target-market .loader-bar {
      background: linear-gradient(90deg, #00D4FF, #0072FF);
    }

    /* Social specific styles */
    .target-social .logo {
      filter: drop-shadow(0 0 20px rgba(175, 64, 255, 0.25));
    }
    .target-social .loader-bar {
      background: linear-gradient(90deg, #AF40FF, #FF007F);
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1.0);
      }
      50% {
        transform: scale(1.04);
      }
    }
    @keyframes loading {
      0% {
        transform: translateX(-100%);
      }
      50% {
        transform: translateX(0%);
      }
      100% {
        transform: translateX(100%);
      }
    }
    #splash-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="splash-screen">
    <div class="logo-container">
      <img class="logo" src="icons/Icon-512.png" alt="ScaleSync Logo" />
      <div id="splash-title" class="title">ScaleSync</div>
      <div class="loader-bar-container">
        <div class="loader-bar"></div>
      </div>
    </div>
  </div>
  <script>
    (function() {
      var port = window.location.port;
      var host = window.location.hostname.toLowerCase();
      var title = 'ScaleSync Pro';
      var targetClass = 'target-pro';

      if (host.includes('marketplace') || port === '8082') {
        title = 'ScaleSync Marketplace';
        targetClass = 'target-market';
      } else if (host.includes('social') || port === '8083') {
        title = 'ScaleSync Social';
        targetClass = 'target-social';
      }

      var splash = document.getElementById('splash-screen');
      var titleEl = document.getElementById('splash-title');
      if (splash) splash.className = targetClass;
      if (titleEl) titleEl.textContent = title;
    })();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
